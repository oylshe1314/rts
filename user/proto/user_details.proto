syntax = "proto3";

package user;

option java_package = "com.sk.rts.application.proto.caching";

option java_multiple_files = true;

message MsgUserDetails {
    int64 id = 1;
    string username = 2;
    string email = 3;
    string phone = 4;
    string password = 5;
    string nickname = 6;
    string avatar = 7;
    int64 createTime = 8;
}

