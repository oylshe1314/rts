syntax = "proto3";

package user;

option java_package = "com.sk.rts.application.proto.caching";

option java_multiple_files = true;

message MsgAccessToken {
    string subject = 1;
    string token = 2;
    int64 issueTime = 3;
    int64 expiration = 4;
}

message MsgRefreshToken {
    int64 userId = 1;
    int64 deviceId = 2;
    string hash = 3;
    int64 issueTime = 4;
    int64 expireTime = 5;
    int64 refreshTime = 6;
}