syntax = "proto3";

package user;

option java_package = "com.sk.rts.application.proto.caching";

option java_multiple_files = true;

message MsgAccessToken {
    string subject = 1;
    string token = 2;
    int64 issueTime = 3;
    int64 expiration = 4;
}

message MsgRefreshToken {
    string key = 1;
    int64 id = 2;
    int64 userId = 3;
    int64 deviceId = 4;
    string hash = 5;
    int32 status = 6;
    int64 issueTime = 7;
    int64 expireTime = 8;
    int64 refreshTime = 9;
}