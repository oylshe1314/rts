syntax = "proto3";

package user;

option java_package = "com.sk.rts.application.proto.caching";

option java_multiple_files = true;

message MsgAccessToken {
    string subject = 1;
    int64 userId = 2;
    int64 deviceId = 3;
    string token = 4;
    int64 issueTime = 5;
    int64 expireTime = 6;
}

message MsgRefreshToken {
    string subject = 1;
    int64 userId = 2;
    int64 deviceId = 3;
    string hash = 4;
    int64 issueTime = 5;
    int64 expireTime = 6;
    int64 refreshTime = 7;
}