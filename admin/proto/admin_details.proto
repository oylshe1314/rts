syntax = "proto3";

package stock;

option java_package = "com.sk.rts.application.proto.caching";

option java_multiple_files = true;

message MsgAdminDetails {
    int64 id = 1;
    int64 roleId = 2;
    string roleName = 3;
    string username = 4;
    string password = 5;
    string phone = 6;
    string email = 7;
    string nickname = 8;
    string avatar = 9;
    string ipAddress = 10;
    repeated string authority = 11;
}